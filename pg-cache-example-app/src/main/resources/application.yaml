pg-cache:
  enabled: true
  table-name: cache_data

  admin-datasource:
    url: jdbc:postgresql://localhost:5432/pgcache
    username: pgcache-admin
    password: pgcache-admin

  user-datasource:
    url: jdbc:postgresql://localhost:5432/pgcache
    username: pgcache-user
    password: pgcache-user
    maximum-pool-size: 5